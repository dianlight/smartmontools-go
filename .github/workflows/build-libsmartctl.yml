name: build-libsmartctl

on:
    schedule:
        - cron: "0 2 * * 0" # weekly: Sunday at 02:00 UTC
    workflow_dispatch:
        inputs:
            version:
                description: "Smartmontools tag to build (e.g. v7.5). Leave empty to use latest release."
                required: false

jobs:
    # ----------------------------------------------------------------
    # Resolve the smartmontools version to build
    # ----------------------------------------------------------------
    check-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.resolve.outputs.version }}
        steps:
            - id: resolve
              name: Resolve smartmontools version
              run: |
                  if [[ -n "${{ github.event.inputs.version }}" ]]; then
                    echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    LATEST=$(curl -s https://api.github.com/repos/smartmontools/smartmontools/releases/latest \
                      | jq -r .tag_name)
                    echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
                  fi

    # ----------------------------------------------------------------
    # Build libsmartctl for each target platform / architecture
    # ----------------------------------------------------------------
    build:
        needs: check-version
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      arch: amd64
                      runner: ubuntu-latest
                      lib_ext: so
                    - os: ubuntu-24.04-arm
                      arch: arm64
                      runner: ubuntu-24.04-arm
                      lib_ext: so
        runs-on: ${{ matrix.runner }}
        name: build (${{ matrix.arch }}, linux)
        steps:
            - uses: actions/checkout@v4

            - name: Install build dependencies
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    autoconf automake libtool g++ libcap-dev \
                    libsystemd-dev libselinux1-dev

            - name: Clone smartmontools ${{ needs.check-version.outputs.version }}
              run: |
                  git clone --depth 1 \
                    --branch "${{ needs.check-version.outputs.version }}" \
                    https://github.com/smartmontools/smartmontools.git src

            - name: Apply D1 patches
              run: |
                  ./patches/apply.sh "${{ needs.check-version.outputs.version }}" src

            - name: Configure
              run: |
                  cd src
                  ./autogen.sh
                  ./configure \
                    --enable-shared \
                    --disable-static \
                    --enable-libsmartctl \
                    CFLAGS="-fPIC" \
                    CXXFLAGS="-fPIC -DBUILDING_LIBSMARTCTL"

            - name: Build
              run: |
                  cd src
                  make -j$(nproc)
                  mkdir -p ../dist
                  cp src/.libs/libsmartctl.so* ../dist/ 2>/dev/null || true
                  cp src/.libs/libsmartctl.dylib ../dist/ 2>/dev/null || true

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: libsmartctl-${{ needs.check-version.outputs.version }}-linux-${{ matrix.arch }}
                  path: dist/
                  if-no-files-found: error

    # ----------------------------------------------------------------
    # macOS build (Intel + Apple Silicon via native runners)
    # ----------------------------------------------------------------
    build-macos:
        needs: check-version
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-latest
                      arch: arm64
                    - runner: macos-13
                      arch: amd64
        runs-on: ${{ matrix.runner }}
        name: build (${{ matrix.arch }}, macos)
        steps:
            - uses: actions/checkout@v4

            - name: Install build dependencies
              run: brew install autoconf automake libtool

            - name: Clone smartmontools ${{ needs.check-version.outputs.version }}
              run: |
                  git clone --depth 1 \
                    --branch "${{ needs.check-version.outputs.version }}" \
                    https://github.com/smartmontools/smartmontools.git src

            - name: Apply D1 patches
              run: |
                  ./patches/apply.sh "${{ needs.check-version.outputs.version }}" src

            - name: Configure
              run: |
                  cd src
                  ./autogen.sh
                  ./configure \
                    --enable-shared \
                    --disable-static \
                    --enable-libsmartctl \
                    CFLAGS="-fPIC" \
                    CXXFLAGS="-fPIC -DBUILDING_LIBSMARTCTL"

            - name: Build
              run: |
                  cd src
                  make -j$(sysctl -n hw.logicalcpu)
                  mkdir -p ../dist
                  cp src/.libs/libsmartctl.dylib ../dist/ 2>/dev/null || true

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: libsmartctl-${{ needs.check-version.outputs.version }}-macos-${{ matrix.arch }}
                  path: dist/
                  if-no-files-found: error

    # ----------------------------------------------------------------
    # File an issue when patches fail to apply on a new upstream version
    # ----------------------------------------------------------------
    report-failure:
        needs: [check-version, build, build-macos]
        if: failure()
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const version = "${{ needs.check-version.outputs.version }}";
                      const title = `libsmartctl D1 patches failed for ${version}`;
                      const body = [
                        `The weekly build-libsmartctl workflow failed for smartmontools **${version}**.`,
                        "",
                        "Upstream changes may have broken one or more patches in `patches/${version}/`.",
                        "",
                        "## Steps to resolve",
                        "1. Clone the new smartmontools tag and manually re-apply the changes.",
                        "2. Run `./patches/generate.sh ${version} <patched-dir>` to create fresh patches.",
                        "3. Open a PR with the new patch files.",
                        "",
                        `Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
                      ].join("\n");
                      const { data: issues } = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo:  context.repo.repo,
                        state: "open",
                        labels: "libsmartctl-build",
                      });
                      const existing = issues.find(i => i.title === title);
                      if (!existing) {
                        await github.rest.issues.create({
                          owner: context.repo.owner,
                          repo:  context.repo.repo,
                          title,
                          body,
                          labels: ["libsmartctl-build"],
                        });
                      }

    # ----------------------------------------------------------------
    # Attach build artifacts to a GitHub Release when a tag is pushed
    # ----------------------------------------------------------------
    release:
        needs: [check-version, build, build-macos]
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: artifacts/
                  pattern: "libsmartctl-*"
                  merge-multiple: false

            - uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**/*
