name: Fetch drivedb.h (Renovate companion)

# Triggered when a branch-based PR updates drivedb_version.go (e.g. by Renovate).
# Downloads the matching drivedb.h and updates DrivedbUpstreamDate, then commits
# both files back to the PR branch.
on:
  pull_request:
    paths:
      - 'backends/exec/drivedb_version.go'
    types: [opened, synchronize]

jobs:
  fetch-drivedb:
    runs-on: ubuntu-latest
    # Only run for PRs from the same repository (not forks); Renovate always
    # creates branches on the upstream repo.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Extract commit SHA from drivedb_version.go
        id: version
        run: |
          SHA=$(grep 'DrivedbUpstreamCommit' backends/exec/drivedb_version.go \
            | grep -oP '[a-f0-9]{40}' | head -1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Detected SHA: $SHA"

      - name: Fetch commit date from GitHub API
        id: meta
        run: |
          DATE=$(curl -fsSL \
            "https://api.github.com/repos/smartmontools/smartmontools/commits/${{ steps.version.outputs.sha }}" \
            | jq -r '.commit.committer.date')
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Download drivedb.h
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/smartmontools/smartmontools/${{ steps.version.outputs.sha }}/lib/drivedb.h" \
            -o backends/exec/drivedb.h

      - name: Regenerate drivedb_version.go with updated date
        run: |
          COMMIT="${{ steps.version.outputs.sha }}"
          DATE="${{ steps.meta.outputs.date }}"
          cat > backends/exec/drivedb_version.go <<EOF
          // Code generated by .github/workflows/drivedb-update.yml; DO NOT EDIT.

          package exec

          // DrivedbUpstreamCommit is the upstream smartmontools commit SHA from which
          // the embedded drivedb.h was taken.
          const DrivedbUpstreamCommit = "${COMMIT}"

          // DrivedbUpstreamDate is the commit date of DrivedbUpstreamCommit in RFC 3339 format.
          const DrivedbUpstreamDate = "${DATE}"
          EOF
          sed -i 's/^[[:space:]]*//' backends/exec/drivedb_version.go

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backends/exec/drivedb.h backends/exec/drivedb_version.go
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🗃️ chore(drivedb): fetch drivedb.h for drivedb@${{ steps.version.outputs.sha }}"
            git push
          fi
